name: Build and Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Xcode
        run: xcodes select 16.1

      - name: Build
        run: swift build -v

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build
        run: swift build -v

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Xcode
        run: xcodes select 16.1

      - name: Run tests
        run: swift test -v --parallel --xunit-output test.xml

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        if: always()
        with:
          files: "test.xml"

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Run tests
        run: swift test -v --parallel
